name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  module:
    name: PowerShell module (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Module manifest is valid
        shell: powershell # Windows PowerShell 5.1 -- what the module targets
        run: Test-ModuleManifest .\shell\Limpet.psd1 | Out-Null
      - name: Alias takeover diagnostics
        shell: powershell
        run: |
          Import-Module .\shell\Limpet.psd1 -Force
          Get-Alias ls, rm, cp, mv, cat -ErrorAction SilentlyContinue | Format-Table Name, Definition, Options
      - name: Command suite (aliases, flags, peek/reels protocol, Hello)
        shell: powershell
        run: .\tests\Test-Limpet.ps1
      - name: xssh suite (bootstrap variants, reconnect policy)
        shell: powershell
        run: .\tests\Test-Xssh.ps1

  remote-sh:
    name: Remote helpers (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ensure tmux (for the resume-bootstrap test)
        run: command -v tmux >/dev/null || sudo apt-get install -y -qq tmux
      - name: Helper + bootstrap suite
        run: bash tests/test-remote-sh.sh

  app:
    name: Electron app (Windows)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json
      - name: Install dependencies (validates native modules on Windows)
        run: npm ci --no-audit --no-fund
      - name: Parse-check sources
        run: foreach ($f in 'src/main.js', 'src/preload.js', 'src/renderer.js', 'src/protocol.js') { node --check $f; if ($LASTEXITCODE) { exit 1 } }
      - name: Protocol unit tests
        run: npm test
      - name: End-to-end (launch app, peek, resize, reels, download)
        run: npm run test:e2e
